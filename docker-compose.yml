version: '3.8'

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    container_name: postgres-task
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-task
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-task
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  # ---------- Microservices ----------
  auth-service:
    build: ./apps/auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./apps/auth-service/.env
    environment:
      - PORT=3001
      - AUTH_DB_URL=postgresql://user:password@postgres:5432/auth_db
      - USER_SERVICE_URL=http://user-service:3002
    depends_on:
      - postgres
    restart: unless-stopped

  user-service:
    build: ./apps/user-service
    container_name: user-service
    ports:
      - "3002:3002"
    env_file:
      - ./apps/user-service/.env
    environment:
      - PORT=3002
      - USER_DB_URL=postgresql://user:password@postgres:5432/user_db
    depends_on:
      - postgres
    restart: unless-stopped

  task-service:
    build: ./apps/task-service
    container_name: task-service
    ports:
      - "3003:3003"
    env_file:
      - ./apps/task-service/.env
    environment:
      - PORT=3003
      - TASK_DB_URL=postgresql://user:password@postgres:5432/task_db
      - USER_SERVICE_URL=http://user-service:3002
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - rabbitmq
      - redis
    restart: unless-stopped

  notification-service:
    build: ./apps/notification-service
    container_name: notification-service
    ports:
      - "3004:3004"
    env_file:
      - ./apps/notification-service/.env
    environment:
      - PORT=3004
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_DB_URL=postgresql://user:password@postgres:5432/notification_db
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - redis
      - postgres
      - rabbitmq
    restart: unless-stopped

  file-service:
    build: ./apps/file-service
    container_name: file-service
    ports:
      - "3005:3005"
    env_file:
      - ./apps/file-service/.env
    environment:
      - PORT=3005
    restart: unless-stopped

  api-gateway:
    build: ./apps/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api-gateway/.env
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - TASK_SERVICE_URL=http://task-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - FILE_SERVICE_URL=http://file-service:3005
    depends_on:
      - auth-service
      - user-service
      - task-service
      - notification-service
      - file-service
    restart: unless-stopped

volumes:
  pg_data:
